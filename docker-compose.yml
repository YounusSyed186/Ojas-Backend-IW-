services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
      - /var/www/vendor
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=ojas
      - DB_USERNAME=ojas
      - DB_PASSWORD=ojas_pass
      - SESSION_DRIVER=file
      - CACHE_STORE=file
      - QUEUE_CONNECTION=sync
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-}
      - MSG91_AUTH_KEY=${MSG91_AUTH_KEY:-}
      - MSG91_OTP_TEMPLATE_ID=${MSG91_OTP_TEMPLATE_ID:-}
      - MSG91_DEFAULT_COUNTRY_CODE=${MSG91_DEFAULT_COUNTRY_CODE:-91}
      - MSG91_OTP_EXPIRY_MINUTES=${MSG91_OTP_EXPIRY_MINUTES:-10}
      - MSG91_MAX_RESEND_ATTEMPTS=${MSG91_MAX_RESEND_ATTEMPTS:-3}
      - MSG91_RESEND_WINDOW_MINUTES=${MSG91_RESEND_WINDOW_MINUTES:-30}
      - MSG91_VERIFY_WITH_PROVIDER=${MSG91_VERIFY_WITH_PROVIDER:-false}
    depends_on:
      db:
        condition: service_healthy
    working_dir: /var/www
    command: >
      sh -c "php artisan migrate --force &&
      php artisan db:seed --force &&
      php artisan serve --host=0.0.0.0 --port=8000"

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ojas
      MYSQL_USER: ojas
      MYSQL_PASSWORD: ojas_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  db_data:
